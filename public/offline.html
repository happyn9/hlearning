<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — H-Learning</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1c1f;
      --border: #2a2d33;
      --indigo: #4f46e5;
      --indigo-light: #6366f1;
      --purple: #9333ea;
      --text-muted: #8b93a3;
      --text-faint: #5b6272;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: #f4f4f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Halos ambiants, très discrets */
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .glow--indigo {
      width: 480px; height: 480px;
      background: rgba(79, 70, 229, 0.18);
      top: -14%; left: -10%;
      animation: drift 6s ease-in-out infinite;
    }
    .glow--purple {
      width: 380px; height: 380px;
      background: rgba(147, 51, 234, 0.14);
      bottom: -12%; right: -8%;
      animation: drift 7s ease-in-out infinite 0.6s;
    }
    @keyframes drift {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 380px;
      width: 100%;
    }

    /* Icône avec anneaux qui se propagent, même langage visuel que le
       loader du cours : le signal qui "cherche" à se reconnecter. */
    .icon-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.35);
      animation: ping 2.2s ease-out infinite;
    }
    .ring--delay { animation-delay: 1.1s; }
    @keyframes ping {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.9); opacity: 0; }
    }
    .icon-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(26, 28, 31, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
      color: #ffffff;
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 auto 28px;
      max-width: 320px;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 13px 32px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--purple) 100%);
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(99, 102, 241, 0.45);
    }
    button:active { transform: translateY(0); }

    .status {
      margin-top: 18px;
      font-size: 12px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f97373;
      box-shadow: 0 0 0 0 rgba(249, 115, 115, 0.5);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    .dot--online {
      background: #4ade80;
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5);
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div class="glow glow--indigo"></div>
  <div class="glow glow--purple"></div>

  <div class="card">
    <div class="icon-wrap">
      <span class="ring"></span>
      <span class="ring ring--delay"></span>
      <div class="icon-circle">
        <!-- Wifi off -->
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1L23 23" stroke="#f4f4f5" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8.5 16.5C10.5 14.7 13.5 14.7 15.5 16.5" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
          <path d="M5 13C8.5 9.9 15.5 9.9 19 13" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
          <path d="M1.5 9.5C7.5 4 16.5 4 22.5 9.5" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round" opacity="0.3"/>
          <circle cx="12" cy="19.5" r="1.4" fill="#6366f1"/>
        </svg>
      </div>
    </div>

    <h1 id="title"></h1>
    <p id="description"></p>

    <button id="retryBtn" onclick="location.reload()"></button>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText"></span>
    </div>
  </div>

  <script>
    // Même logique de détection de langue que le reste de l'app :
    // localStorage.lang -> langue du navigateur -> "en" par défaut.
    const TRANSLATIONS = {
      en: {
        pageTitle: "Offline — H-Learning",
        title: "No connection",
        description: "Check your internet connection and try again. Some pages remain available offline.",
        retry: "Try again",
        searching: "Looking for a connection…",
        restored: "Connection restored — reloading…",
      },
      fr: {
        pageTitle: "Hors ligne — H-Learning",
        title: "Pas de connexion",
        description: "Vérifie ta connexion internet et réessaie. Certaines pages restent disponibles hors ligne.",
        retry: "Réessayer",
        searching: "Recherche de connexion…",
        restored: "Connexion rétablie — rechargement…",
      },
    };

    function detectLang() {
      const saved = localStorage.getItem("lang");
      if (saved && TRANSLATIONS[saved]) return saved;

      const browserLang = (navigator.language || "en").split("-")[0];
      return TRANSLATIONS[browserLang] ? browserLang : "en";
    }

    const lang = detectLang();
    const t = TRANSLATIONS[lang];

    document.documentElement.lang = lang;
    document.title = t.pageTitle;
    document.getElementById("title").textContent = t.title;
    document.getElementById("description").textContent = t.description;
    document.getElementById("retryBtn").textContent = t.retry;

    // Rechargement automatique dès que la connexion revient.
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');

    function updateStatus() {
      if (navigator.onLine) {
        dot.classList.add('dot--online');
        text.textContent = t.restored;
        setTimeout(() => location.reload(), 600);
      } else {
        dot.classList.remove('dot--online');
        text.textContent = t.searching;
      }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
